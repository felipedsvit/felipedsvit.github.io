<meta property="og:site_name" content="{{ site.title }}">
<meta property="og:locale" content="pt_BR">
{% if page.layout == "post" %}
<meta property="og:type" content="article">
<meta property="og:title" content="{{ page.title | escape }}">
<meta property="og:description" content="{{ page.description | default: page.excerpt | strip_html | truncate: 160 | escape }}">
{% elsif page.layout == "project" %}
<meta property="og:type" content="website">
<meta property="og:title" content="{{ page.title | escape }} — {{ site.title }}">
<meta property="og:description" content="{{ page.description | escape }}">
{% else %}
<meta property="og:type" content="website">
<meta property="og:title" content="{{ page.title | default: site.title | escape }}">
<meta property="og:description" content="{{ site.description | escape }}">
{% endif %}
<meta property="og:url" content="{{ page.url | prepend: site.url }}">
{% if page.image %}
<meta property="og:image" content="{{ page.image | prepend: site.url }}">
{% else %}
<meta property="og:image" content="{{ '/assets/logo.webp' | prepend: site.url }}">
{% endif %}
