<article class="project-card">
  <div class="project-card-header">
    <h3><a href="{{ include.project.url | relative_url }}">{{ include.project.title }}</a></h3>
    {% if include.project.visibility == "private" %}
    <span class="badge badge-private">privado</span>
    {% else %}
    <span class="badge badge-public">público</span>
    {% endif %}
  </div>
  <p class="project-card-description">{{ include.project.description }}</p>
  <div class="project-card-stack">
    {% for tech in include.project.stack %}<span class="tag">{{ tech }}</span>{% endfor %}
  </div>
  {% if include.project.repo %}
  <a class="project-card-link" href="{{ include.project.repo }}" target="_blank" rel="noopener">Ver no GitHub →</a>
  {% endif %}
</article>
