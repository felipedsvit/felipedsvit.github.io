<nav class="nav">
  <div class="nav-container">
    <a class="nav-brand" href="{{ '/' | relative_url }}">
      <img src="{{ '/assets/logo.webp' | relative_url }}" alt="{{ site.title }}" class="nav-logo" width="28" height="28">
      <span class="nav-brand-text">{{ site.title }}</span>
    </a>
    <ul class="nav-links" id="nav-links">
      {% for item in site.data.navigation %}
      <li>
        <a href="{{ item.url | relative_url }}"{% if page.url == item.url %} class="active"{% endif %}>
          {{ item.title }}
        </a>
      </li>
      {% endfor %}
      <li><a href="https://github.com/{{ site.author.github }}" target="_blank" rel="noopener">GitHub</a></li>
    </ul>
    <button class="theme-toggle" id="theme-toggle" aria-label="Alternar tema">◐</button>
    <button class="nav-toggle" id="nav-toggle" aria-label="Menu">
      <span></span><span></span><span></span>
    </button>
  </div>
</nav>
