---
layout: default
---
<div class="container">
  <article class="snippet-page">
    <header class="snippet-header">
      <div class="snippet-meta">
        <time datetime="{{ page.date | date_to_xmlschema }}">{{ page.date | date: "%d %b %Y" }}</time>
      </div>
      <h1>{{ page.title }}</h1>
      {% if page.tags %}
      <div class="snippet-tags">
        {% for tag in page.tags %}<span class="tag">{{ tag }}</span>{% endfor %}
      </div>
      {% endif %}
    </header>
    <div class="snippet-content">
      {{ content }}
    </div>
  </article>
</div>
